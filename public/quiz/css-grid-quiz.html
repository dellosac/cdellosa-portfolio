<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --correct: #4ade80;
    --wrong: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
  }

  .quiz-wrapper {
    width: 100%;
    max-width: 720px;
  }

  header {
    margin-bottom: 48px;
  }

  .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 0.95rem;
    font-family: 'Space Mono', monospace;
  }

  /* Progress bar */
  .progress-track {
    height: 3px;
    background: var(--border);
    margin-bottom: 40px;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
    border-radius: 2px;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 16px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .q-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .question-text {
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  /* Code snippet */
  .code-snippet {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin: 16px 0;
    color: #ccc;
    overflow-x: auto;
    line-height: 1.7;
  }
  .code-snippet .prop { color: #79b8ff; }
  .code-snippet .val { color: #f6c90e; }
  .code-snippet .comment { color: #555; }

  /* Visual grid demo */
  .grid-demo {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin: 16px 0;
  }
  .mini-grid {
    display: grid;
    gap: 4px;
  }
  .mini-cell {
    background: #333;
    border-radius: 3px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .mini-cell.highlight { background: #2a3a1a; border: 1px solid var(--accent); color: var(--accent); }
  .mini-cell.highlight2 { background: #3a1a1a; border: 1px solid var(--accent2); color: var(--accent2); }

  /* Options */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 24px;
  }

  .option {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--text);
    text-align: left;
    transition: all 0.15s ease;
    line-height: 1.5;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: #1f1f1a;
  }

  .option:disabled { cursor: default; }

  .option.correct {
    border-color: var(--correct);
    background: rgba(74, 222, 128, 0.08);
    color: var(--correct);
  }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(248, 113, 113, 0.08);
    color: var(--wrong);
  }

  .option.reveal {
    border-color: var(--correct);
    background: rgba(74, 222, 128, 0.05);
    color: var(--correct);
    opacity: 0.7;
  }

  /* Feedback */
  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    display: none;
  }

  .feedback.show { display: block; animation: fadeIn 0.2s ease; }
  .feedback.correct-fb { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.3); color: var(--correct); }
  .feedback.wrong-fb { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3); color: var(--wrong); }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  /* Nav */
  .nav {
    display: flex;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 12px 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s ease;
    display: none;
  }

  .btn-next {
    background: var(--accent);
    color: #0d0d0d;
  }
  .btn-next:hover { background: #d4eb3c; transform: translateY(-1px); }
  .btn-next.show { display: block; }

  /* Score screen */
  .score-screen {
    display: none;
    text-align: center;
    padding: 40px 0;
    animation: slideIn 0.3s ease;
  }
  .score-screen.show { display: block; }

  .score-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
  }

  .score-num {
    font-size: 3rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .score-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .score-title {
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .score-subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 40px;
  }

  .breakdown {
    text-align: left;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .breakdown-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .breakdown-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .breakdown-row:last-child { border-bottom: none; }

  .bd-icon {
    font-size: 0.9rem;
    margin-top: 1px;
    flex-shrink: 0;
  }

  .bd-q { flex: 1; line-height: 1.4; }
  .bd-q .bd-answer {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .btn-restart {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 14px 36px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-restart:hover { background: var(--accent); color: #0d0d0d; }

</style>
</head>
<body>
<div class="quiz-wrapper">
  <header>
    <div class="label">Knowledge Check</div>
    <h1>CSS <span>Grid</span><br>Quiz</h1>
    <p class="subtitle">30 questions · all levels</p>
  </header>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div id="quizBody"></div>
  <div id="scoreScreen" class="score-screen"></div>
</div>

<script>
const questions = [
  // ── BASICS ──────────────────────────────────────────────────────────────
  {
    tag: "basics",
    text: "Which property turns an element into a grid container?",
    options: ["display: grid", "grid: on", "position: grid", "layout: grid"],
    answer: 0,
    feedback: "<code>display: grid</code> (or <code>display: inline-grid</code>) activates Grid on a container and makes its direct children grid items."
  },
  {
    tag: "basics",
    text: "What is the difference between <code>display: grid</code> and <code>display: inline-grid</code>?",
    options: [
      "No difference — they're aliases",
      "grid creates a block-level container; inline-grid creates an inline-level container",
      "inline-grid only works for row direction",
      "grid is deprecated in favor of inline-grid"
    ],
    answer: 1,
    feedback: "<code>display: grid</code> makes the container behave like a block (full-width line), while <code>display: inline-grid</code> makes it shrink-wrap its content and sit inline with text, like <code>inline-block</code>."
  },
  {
    tag: "basics",
    text: "Which elements become grid items automatically?",
    options: [
      "All descendants of the grid container",
      "Only elements with class 'grid-item'",
      "Only direct children of the grid container",
      "All block-level children"
    ],
    answer: 2,
    feedback: "Only <strong>direct children</strong> of a grid container become grid items. Deeper descendants are not automatically part of the grid — though they can be placed inside a nested grid."
  },
  // ── COLUMNS & ROWS ──────────────────────────────────────────────────────
  {
    tag: "columns",
    text: "What does this CSS create?",
    code: `<span class='prop'>grid-template-columns</span>: <span class='val'>repeat(3, 1fr)</span>;`,
    options: ["3 equal-width columns", "3 columns of 1px each", "A 3-row grid", "Columns that auto-fit content"],
    answer: 0,
    feedback: "<code>repeat(3, 1fr)</code> creates 3 columns, each taking 1 fraction of available space — so they share it equally."
  },
  {
    tag: "columns",
    text: "A grid container is 900px wide. What are the actual column widths produced by this rule?",
    code: `<span class='prop'>grid-template-columns</span>: <span class='val'>200px 1fr 2fr</span>;`,
    options: [
      "200px, 233px, 467px",
      "200px, 350px, 350px",
      "300px, 300px, 300px",
      "200px, 233.33px, 466.67px"
    ],
    answer: 3,
    feedback: "After subtracting the fixed 200px column, 700px remains. The <code>fr</code> tracks split that proportionally: <code>1fr</code> = 700/3 ≈ 233.33px, <code>2fr</code> ≈ 466.67px."
  },
  {
    tag: "rows",
    text: "What does <code>grid-auto-rows: minmax(100px, auto)</code> do?",
    options: [
      "Restricts all rows to exactly 100px",
      "Sets implicit rows to at least 100px, growing if content requires it",
      "Creates 100px rows only for the first row",
      "Makes rows 100px wide"
    ],
    answer: 1,
    feedback: "<code>grid-auto-rows</code> controls the size of <em>implicitly</em> created rows (rows not defined in <code>grid-template-rows</code>). <code>minmax(100px, auto)</code> ensures each is at least 100px tall but expands for taller content."
  },
  // ── UNITS ────────────────────────────────────────────────────────────────
  {
    tag: "units",
    text: "What is the <code>fr</code> unit?",
    options: [
      "A fixed pixel fraction",
      "A flexible fraction of remaining space",
      "Stands for 'frame' — used in animations",
      "Same as a percentage"
    ],
    answer: 1,
    feedback: "<code>fr</code> distributes available (leftover) space after fixed/auto sizes are placed. <code>2fr 1fr</code> gives ⅔ and ⅓ of remaining space."
  },
  {
    tag: "units",
    text: "Can you use <code>fr</code> as the minimum value inside <code>minmax()</code>?",
    options: [
      "Yes, e.g. minmax(1fr, 200px) is valid",
      "No — fr is invalid as a minmax minimum",
      "Only in Firefox",
      "Yes, but only with auto-fit"
    ],
    answer: 1,
    feedback: "The <code>fr</code> unit is <strong>not allowed</strong> as the minimum value in <code>minmax()</code>. It can only be used as the maximum. Use <code>minmax(0, 1fr)</code> or <code>minmax(auto, 1fr)</code> instead."
  },
  // ── GAP ──────────────────────────────────────────────────────────────────
  {
    tag: "gap",
    text: "Which property correctly adds space between grid tracks?",
    options: ["margin: 10px", "gap: 10px  (formerly grid-gap)", "padding: 10px", "grid-spacing: 10px"],
    answer: 1,
    feedback: "<code>gap</code> sets spacing between rows and columns. You can also use <code>row-gap</code> and <code>column-gap</code> separately. <code>grid-gap</code> is the old prefixed name."
  },
  {
    tag: "gap",
    text: "What does <code>gap: 20px 10px</code> mean on a grid container?",
    options: [
      "20px gap on left/right, 10px on top/bottom",
      "20px row gap, 10px column gap",
      "10px row gap, 20px column gap",
      "A uniform 20px gap with 10px padding"
    ],
    answer: 1,
    feedback: "The two-value shorthand for <code>gap</code> is <code>row-gap column-gap</code> — just like <code>margin</code> or <code>padding</code> with two values. So <code>gap: 20px 10px</code> = 20px between rows, 10px between columns."
  },
  // ── PLACEMENT ────────────────────────────────────────────────────────────
  {
    tag: "placement",
    text: "An item has <code>grid-column: 1 / 3</code>. How many columns does it span?",
    options: ["1 column", "2 columns", "3 columns", "The full row"],
    answer: 1,
    feedback: "<code>1 / 3</code> means from grid line 1 to grid line 3 — spanning 2 column tracks."
  },
  {
    tag: "placement",
    text: "What does <code>grid-column: span 2</code> mean?",
    options: [
      "Place the item starting at column line 2",
      "The item spans 2 column tracks from its auto-placed position",
      "The item always starts at column 1 and ends at column 2",
      "Creates 2 new columns"
    ],
    answer: 1,
    feedback: "<code>span 2</code> is a relative placement keyword. The auto-placement algorithm picks the start line, and the item extends across 2 column tracks from there. It does NOT pin the item to any specific line."
  },
  {
    tag: "placement",
    text: "What does negative line numbering let you do?",
    code: `<span class='prop'>grid-column</span>: <span class='val'>1 / -1</span>;`,
    options: [
      "Causes an error — negative lines are invalid",
      "Spans the item from the first to the very last explicit column line",
      "Places the item one track from the end",
      "Reverses the item direction"
    ],
    answer: 1,
    feedback: "Negative line numbers count from the end of the <em>explicit</em> grid. <code>-1</code> is always the last line, so <code>1 / -1</code> stretches an item across all explicit columns — a great trick for full-width rows."
  },
  {
    tag: "placement",
    text: "What does <code>grid-column: 2 / span 3</code> mean?",
    options: [
      "Starts at column line 2, spans 3 tracks (ends at line 5)",
      "Starts at column 3, ends at column 2",
      "Occupies columns 2 and 3 only",
      "Starts at the 2nd track and spans to the last"
    ],
    answer: 0,
    feedback: "You can mix explicit start lines with span keywords. <code>2 / span 3</code> starts at grid line 2 and covers 3 column tracks, so it ends at line 5."
  },
  // ── AUTO-FIT / AUTO-FILL ──────────────────────────────────────────────
  {
    tag: "auto-fit",
    text: "What's the key difference between <code>auto-fill</code> and <code>auto-fit</code>?",
    options: [
      "They're identical — just aliases",
      "auto-fit collapses empty tracks; auto-fill keeps them",
      "auto-fill collapses empty tracks; auto-fit keeps them",
      "auto-fit only works with minmax()"
    ],
    answer: 1,
    feedback: "With <code>auto-fit</code>, empty repeated tracks collapse to 0, letting items stretch to fill the container. With <code>auto-fill</code>, empty tracks remain, so items don't stretch beyond their max size."
  },
  {
    tag: "auto-fit",
    text: "Which declaration creates a fully responsive grid with no media queries — columns that are at least 200px but grow to fill space?",
    options: [
      "grid-template-columns: repeat(auto, 200px)",
      "grid-template-columns: repeat(auto-fit, minmax(200px, 1fr))",
      "grid-template-columns: auto-fit 200px",
      "grid-template-columns: repeat(auto-fill, 200px)"
    ],
    answer: 1,
    feedback: "<code>repeat(auto-fit, minmax(200px, 1fr))</code> is the classic responsive grid trick. The browser fits as many 200px columns as it can, then stretches them with <code>1fr</code> to fill the container — no media queries needed!"
  },
  // ── ALIGNMENT ────────────────────────────────────────────────────────────
  {
    tag: "alignment",
    text: "Which property aligns ALL grid items along the column axis (vertically) within their cells?",
    options: ["justify-items", "align-items", "justify-content", "align-content"],
    answer: 1,
    feedback: "<code>align-items</code> controls vertical (block axis) alignment within each cell. <code>justify-items</code> handles horizontal alignment."
  },
  {
    tag: "alignment",
    text: "What is the difference between <code>align-items</code> and <code>align-content</code> on a grid?",
    options: [
      "They do the same thing",
      "align-items aligns items within their tracks; align-content distributes tracks within the container",
      "align-content applies to individual items; align-items to the whole grid",
      "align-items only works when there's one row"
    ],
    answer: 1,
    feedback: "<code>align-items</code> aligns each item <em>inside</em> its grid area. <code>align-content</code> distributes the <em>tracks themselves</em> when there's extra space in the container — similar to flexbox's <code>align-content</code>."
  },
  {
    tag: "alignment",
    text: "How do you override <code>align-items</code> for a single grid item?",
    options: [
      "Use align-self on the item",
      "Use align-override on the item",
      "Use item-align on the container",
      "You can't — align-items always wins"
    ],
    answer: 0,
    feedback: "<code>align-self</code> (and <code>justify-self</code>) let individual grid items override the container's <code>align-items</code> / <code>justify-items</code> values. Great for one-off alignment exceptions."
  },
  {
    tag: "alignment",
    text: "What value of <code>justify-content</code> places gaps only between tracks (not at the edges)?",
    options: ["space-around", "space-evenly", "space-between", "center"],
    answer: 2,
    feedback: "<code>space-between</code> puts equal space <em>between</em> tracks with no space at the outer edges. <code>space-around</code> adds half-size space at edges; <code>space-evenly</code> makes all gaps equal including edges."
  },
  // ── SHORTHAND ────────────────────────────────────────────────────────────
  {
    tag: "shorthand",
    text: "What does <code>grid-area: 2 / 1 / 4 / 3</code> mean?",
    code: `<span class='comment'>/* row-start / col-start / row-end / col-end */</span>\n<span class='prop'>grid-area</span>: <span class='val'>2 / 1 / 4 / 3</span>;`,
    options: [
      "Starts row 2, col 1 — spans to row 4, col 3",
      "Row 2, col 1, with width 4 and height 3",
      "Occupies the 4th row and 3rd column",
      "Creates a named grid area called '2 1 4 3'"
    ],
    answer: 0,
    feedback: "The 4-value shorthand: <code>row-start / column-start / row-end / column-end</code>. This item spans 2 rows (lines 2→4) and 2 columns (lines 1→3)."
  },
  {
    tag: "shorthand",
    text: "What does the <code>grid</code> shorthand property set?",
    options: [
      "Only grid-template-columns and grid-template-rows",
      "All grid-template-* and grid-auto-* properties in one declaration",
      "Only named template areas",
      "Only grid-gap"
    ],
    answer: 1,
    feedback: "The <code>grid</code> shorthand sets <code>grid-template-rows</code>, <code>grid-template-columns</code>, <code>grid-template-areas</code>, <code>grid-auto-rows</code>, <code>grid-auto-columns</code>, and <code>grid-auto-flow</code> — all at once. It resets any omitted values to their initial state."
  },
  // ── MINMAX ────────────────────────────────────────────────────────────
  {
    tag: "minmax",
    text: "What does <code>minmax(150px, 1fr)</code> do as a track size?",
    options: [
      "Creates a track exactly 150px wide",
      "Creates a track at least 150px, growing to fill remaining space",
      "Creates a track that shrinks below 150px if needed",
      "Averages 150px and 1fr"
    ],
    answer: 1,
    feedback: "<code>minmax(min, max)</code> sets a floor and ceiling. The track won't shrink below 150px but can grow up to its full <code>1fr</code> share of available space."
  },
  {
    tag: "minmax",
    text: "What is the behavior of <code>minmax(0, 1fr)</code> vs <code>minmax(auto, 1fr)</code>?",
    options: [
      "Identical behavior in all cases",
      "minmax(0, 1fr) allows the track to shrink to 0; minmax(auto, 1fr) respects content min-size",
      "minmax(auto, 1fr) allows the track to shrink to 0; minmax(0, 1fr) does not",
      "minmax(0, 1fr) is invalid CSS"
    ],
    answer: 1,
    feedback: "With <code>minmax(auto, 1fr)</code>, the track's minimum size is its content's intrinsic minimum — it won't overflow but won't shrink past content. <code>minmax(0, 1fr)</code> explicitly sets the minimum to 0, allowing the track to shrink freely and preventing content from blowing out the grid."
  },
  // ── TEMPLATE AREAS ───────────────────────────────────────────────────────
  {
    tag: "template areas",
    text: "What does this grid-template-areas definition create?",
    code: `<span class='prop'>grid-template-areas</span>:\n  <span class='val'>"header header"</span>\n  <span class='val'>"sidebar main"</span>\n  <span class='val'>"footer footer"</span>;`,
    options: [
      "A 2-column, 3-row layout with full-width header and footer",
      "Three rows where every cell is full-width",
      "A 3-column layout with named rows",
      "This syntax is invalid"
    ],
    answer: 0,
    feedback: "Each quoted string is a row; each word is a cell. <code>header</code> and <code>footer</code> span both columns. Assign areas to elements with <code>grid-area: header</code> etc."
  },
  {
    tag: "template areas",
    text: "How do you create an empty cell inside a <code>grid-template-areas</code> definition?",
    options: [
      "Leave the string blank: \"\"",
      "Use a dot: \".\"",
      "Use the keyword none",
      "Use grid-area: empty on the element"
    ],
    answer: 1,
    feedback: "A period <code>.</code> (or multiple periods like <code>...</code>) represents an empty/unnamed cell in <code>grid-template-areas</code>. No element will be auto-placed there via named areas."
  },
  // ── IMPLICIT GRID ────────────────────────────────────────────────────────
  {
    tag: "implicit grid",
    text: "What is the 'implicit grid'?",
    options: [
      "Tracks defined by grid-template-columns/rows",
      "Tracks automatically created when items are placed outside the explicit grid",
      "A grid with no defined columns",
      "The CSS Grid specification's internal layout engine"
    ],
    answer: 1,
    feedback: "The <strong>implicit grid</strong> is created automatically when items are placed (or auto-placed) beyond the boundaries of the <em>explicit</em> grid (tracks you defined with <code>grid-template-*</code>). Control implicit track sizes with <code>grid-auto-rows</code> and <code>grid-auto-columns</code>."
  },
  {
    tag: "implicit grid",
    text: "What does <code>grid-auto-flow: column</code> do?",
    options: [
      "Items flow into rows automatically (the default)",
      "Items are placed filling columns first, adding new columns as needed",
      "Items flow from right to left",
      "Creates columns of automatic width"
    ],
    answer: 1,
    feedback: "By default, <code>grid-auto-flow</code> is <code>row</code> — items fill row by row. Setting it to <code>column</code> makes items fill column by column instead, creating new columns in the implicit grid as needed."
  },
  // ── NAMED LINES ──────────────────────────────────────────────────────────
  {
    tag: "named lines",
    text: "What does the following declare, and how do you use the names?",
    code: `<span class='prop'>grid-template-columns</span>: <span class='val'>[start] 1fr [mid] 1fr [end]</span>;`,
    options: [
      "Named grid lines; use them like grid-column: start / end",
      "Named columns; reference with column-name: start",
      "CSS custom properties for column widths",
      "This syntax is invalid"
    ],
    answer: 0,
    feedback: "Square brackets define named grid lines. Instead of <code>grid-column: 1 / 3</code>, you can write <code>grid-column: start / end</code> — making layout code much more readable and maintainable."
  },
  // ── SUBGRID ──────────────────────────────────────────────────────────────
  {
    tag: "subgrid",
    text: "What does <code>grid-template-columns: subgrid</code> do on a nested grid item?",
    options: [
      "Copies the parent grid's column definitions exactly, creating the same number of columns",
      "Makes the nested element's columns participate in and align with the parent grid's column tracks",
      "Converts the element into an inline grid",
      "This property does not exist"
    ],
    answer: 1,
    feedback: "<code>subgrid</code> (added in CSS Grid Level 2) lets a grid item's own children align to the <em>parent</em> grid's tracks rather than creating a new independent grid. This is extremely powerful for card components where you want inner elements (like card titles) to align across sibling cards."
  },
  // ── DENSE PACKING ────────────────────────────────────────────────────────
  {
    tag: "auto-flow",
    text: "What does adding <code>dense</code> to <code>grid-auto-flow</code> do?",
    code: `<span class='prop'>grid-auto-flow</span>: <span class='val'>row dense</span>;`,
    options: [
      "Items are placed more tightly by reducing gaps",
      "The algorithm backfills earlier empty cells with smaller items, potentially changing visual order",
      "Items are compressed to their minimum size",
      "dense is not a valid value for grid-auto-flow"
    ],
    answer: 1,
    feedback: "<code>dense</code> tells the auto-placement algorithm to attempt to fill in holes earlier in the grid using smaller items that appear later in the DOM. This improves grid density but <strong>changes visual order</strong>, which can harm accessibility — use with caution."
  },
  // ── ADVANCED / TRICKY ────────────────────────────────────────────────────
  {
    tag: "advanced",
    text: "Two items both target <code>grid-column: 1 / 3; grid-row: 1 / 3</code>. What happens?",
    options: [
      "The second item is pushed to the next available cell",
      "Both items overlap in that area — grid allows overlapping",
      "A CSS error occurs and neither item renders",
      "The second item is hidden behind the first with no way to control it"
    ],
    answer: 1,
    feedback: "CSS Grid <strong>allows items to overlap</strong>! Both items will occupy the same grid area. Use <code>z-index</code> to control which appears on top. This is intentional and enables powerful layered layouts."
  },
  {
    tag: "advanced",
    text: "What does <code>place-items: center</code> do on a grid container?",
    options: [
      "Centers the grid container itself on the page",
      "Sets both align-items and justify-items to center in one shorthand",
      "Centers only the first grid item",
      "place-items is not a valid CSS property"
    ],
    answer: 1,
    feedback: "<code>place-items</code> is a shorthand for <code>align-items</code> + <code>justify-items</code>. A single value sets both axes. So <code>place-items: center</code> centers all items both vertically and horizontally within their grid areas — a very clean way to center content."
  }
];

let current = 0;
let score = 0;
let answered = false;
let results = [];

function render() {
  const q = questions[current];
  const container = document.getElementById('quizBody');
  document.getElementById('progressFill').style.width = `${(current / questions.length) * 100}%`;

  let codeHTML = q.code ? `<div class="code-snippet">${q.code}</div>` : '';

  container.innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-num">Question ${current + 1} of ${questions.length}</span>
        <span class="q-tag">${q.tag}</span>
      </div>
      <div class="question-text">${q.text}</div>
      ${codeHTML}
      <div class="options">
        ${q.options.map((o, i) => `<button class="option" onclick="select(${i})" id="opt${i}">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="nav">
      <button class="btn btn-next" id="btnNext" onclick="next()">${current === questions.length - 1 ? 'See Results' : 'Next Question'}</button>
    </div>
  `;
  answered = false;
}

function select(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = i === q.answer;
  if (isCorrect) score++;
  results.push({ q: q.text, correct: isCorrect, answer: q.options[q.answer] });

  q.options.forEach((_, idx) => {
    const btn = document.getElementById(`opt${idx}`);
    btn.disabled = true;
    if (idx === q.answer) btn.classList.add(isCorrect && idx === i ? 'correct' : 'reveal');
    if (idx === i && !isCorrect) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.innerHTML = (isCorrect ? '✓ ' : '✗ ') + q.feedback;
  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  document.getElementById('btnNext').classList.add('show');
}

function next() {
  current++;
  if (current >= questions.length) showScore();
  else render();
}

function showScore() {
  document.getElementById('quizBody').innerHTML = '';
  document.getElementById('progressFill').style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const msg = pct === 100 ? "Grid Master! 🏆" : pct >= 80 ? "Solid Knowledge!" : pct >= 60 ? "Good Start!" : "Keep Practicing!";
  const sub = pct === 100 ? "You nailed every question." : pct >= 80 ? "You know your Grid well." : pct >= 60 ? "Review the tricky parts." : "CSS Grid takes practice — you'll get there!";

  const screen = document.getElementById('scoreScreen');
  screen.innerHTML = `
    <div class="score-circle">
      <div class="score-num">${score}/${questions.length}</div>
      <div class="score-label">Correct</div>
    </div>
    <div class="score-title">${msg}</div>
    <div class="score-subtitle">${sub}</div>
    <div class="breakdown">
      <div class="breakdown-header">Question Breakdown</div>
      ${results.map((r, i) => `
        <div class="breakdown-row">
          <span class="bd-icon">${r.correct ? '✅' : '❌'}</span>
          <div class="bd-q">
            <div>Q${i+1}: ${r.q}</div>
            ${!r.correct ? `<div class="bd-answer">Answer: ${r.answer}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
    <button class="btn-restart" onclick="restart()">Try Again</button>
  `;
  screen.classList.add('show');
}

function restart() {
  current = 0; score = 0; results = [];
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('progressFill').style.width = '0%';
  render();
}

render();
</script>
</body>
