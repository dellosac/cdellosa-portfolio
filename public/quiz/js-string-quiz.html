<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JS String Methods Quiz</title>
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #0a0a0f;
                --surface: #12121a;
                --card: #1a1a26;
                --border: #2a2a3d;
                --accent: #7c3aed;
                --accent2: #06b6d4;
                --accent3: #f59e0b;
                --correct: #10b981;
                --wrong: #ef4444;
                --text: #e2e8f0;
                --muted: #64748b;
                --code-bg: #0d0d14;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "Syne", sans-serif;
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* Animated grid background */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(
                        rgba(124, 58, 237, 0.03) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(124, 58, 237, 0.03) 1px,
                        transparent 1px
                    );
                background-size: 40px 40px;
                pointer-events: none;
                z-index: 0;
            }

            .glow-orb {
                position: fixed;
                border-radius: 50%;
                filter: blur(80px);
                opacity: 0.15;
                pointer-events: none;
                z-index: 0;
            }
            .orb1 {
                width: 400px;
                height: 400px;
                background: var(--accent);
                top: -100px;
                left: -100px;
                animation: drift 12s ease-in-out infinite;
            }
            .orb2 {
                width: 300px;
                height: 300px;
                background: var(--accent2);
                bottom: -80px;
                right: -80px;
                animation: drift 15s ease-in-out infinite reverse;
            }

            @keyframes drift {
                0%,
                100% {
                    transform: translate(0, 0);
                }
                50% {
                    transform: translate(30px, 20px);
                }
            }

            .container {
                position: relative;
                z-index: 1;
                max-width: 780px;
                margin: 0 auto;
                padding: 40px 20px 80px;
            }

            /* Header */
            .header {
                text-align: center;
                margin-bottom: 48px;
                animation: slideDown 0.6s ease;
            }

            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .badge {
                display: inline-block;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                color: white;
                font-family: "JetBrains Mono", monospace;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 2px;
                padding: 6px 16px;
                border-radius: 20px;
                text-transform: uppercase;
                margin-bottom: 20px;
            }

            h1 {
                font-size: clamp(32px, 6vw, 52px);
                font-weight: 800;
                line-height: 1.1;
                background: linear-gradient(
                    135deg,
                    #fff 0%,
                    #a78bfa 50%,
                    var(--accent2) 100%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 12px;
            }

            .subtitle {
                color: var(--muted);
                font-size: 15px;
                font-family: "JetBrains Mono", monospace;
            }

            /* Progress bar */
            .progress-area {
                margin-bottom: 32px;
                animation: fadeIn 0.5s ease 0.3s both;
            }

            .progress-info {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
            }

            .progress-label {
                font-family: "JetBrains Mono", monospace;
                font-size: 12px;
                color: var(--muted);
                letter-spacing: 1px;
                text-transform: uppercase;
            }

            .progress-score {
                font-family: "JetBrains Mono", monospace;
                font-size: 13px;
                color: var(--accent2);
                font-weight: 700;
            }

            .progress-bar {
                height: 4px;
                background: var(--border);
                border-radius: 2px;
                overflow: hidden;
            }

            .progress-fill {
                height: 100%;
                background: linear-gradient(
                    90deg,
                    var(--accent),
                    var(--accent2)
                );
                border-radius: 2px;
                transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }

            /* Question Card */
            .question-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 36px;
                margin-bottom: 24px;
                animation: cardIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                overflow: hidden;
            }

            .question-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(
                    90deg,
                    var(--accent),
                    var(--accent2)
                );
                opacity: 0.6;
            }

            @keyframes cardIn {
                from {
                    opacity: 0;
                    transform: translateY(16px) scale(0.98);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            .question-number {
                font-family: "JetBrains Mono", monospace;
                font-size: 11px;
                color: var(--accent);
                letter-spacing: 2px;
                text-transform: uppercase;
                margin-bottom: 14px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .question-number::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--border);
            }

            .question-text {
                font-size: 17px;
                font-weight: 700;
                line-height: 1.6;
                color: var(--text);
                margin-bottom: 20px;
            }

            .code-block {
                background: var(--code-bg);
                border: 1px solid var(--border);
                border-left: 3px solid var(--accent);
                border-radius: 8px;
                padding: 16px 20px;
                font-family: "JetBrains Mono", monospace;
                font-size: 13px;
                color: #a78bfa;
                margin-bottom: 24px;
                line-height: 1.7;
                overflow-x: auto;
                white-space: pre;
            }

            .code-block .kw {
                color: var(--accent2);
            }
            .code-block .str {
                color: #86efac;
            }
            .code-block .num {
                color: var(--accent3);
            }
            .code-block .fn {
                color: #fbbf24;
            }
            .code-block .cm {
                color: var(--muted);
            }

            /* Options */
            .options {
                display: grid;
                gap: 10px;
            }

            .option-btn {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 14px 20px;
                color: var(--text);
                font-family: "JetBrains Mono", monospace;
                font-size: 13px;
                cursor: pointer;
                text-align: left;
                transition: all 0.2s ease;
                display: flex;
                align-items: center;
                gap: 12px;
                position: relative;
                overflow: hidden;
            }

            .option-btn::before {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                opacity: 0;
                transition: opacity 0.2s;
            }

            .option-label {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 24px;
                height: 24px;
                background: var(--border);
                border-radius: 6px;
                font-size: 11px;
                font-weight: 700;
                flex-shrink: 0;
                position: relative;
                z-index: 1;
                transition: all 0.2s;
            }

            .option-text {
                position: relative;
                z-index: 1;
            }

            .option-btn:hover:not(:disabled) {
                border-color: var(--accent);
                transform: translateX(4px);
            }

            .option-btn:hover:not(:disabled) .option-label {
                background: var(--accent);
            }

            .option-btn.correct {
                border-color: var(--correct);
                background: rgba(16, 185, 129, 0.08);
            }

            .option-btn.correct .option-label {
                background: var(--correct);
                color: white;
            }

            .option-btn.wrong {
                border-color: var(--wrong);
                background: rgba(239, 68, 68, 0.08);
            }

            .option-btn.wrong .option-label {
                background: var(--wrong);
                color: white;
            }

            .option-btn:disabled {
                cursor: default;
            }

            /* Feedback */
            .feedback {
                margin-top: 16px;
                padding: 14px 18px;
                border-radius: 10px;
                font-size: 13px;
                font-family: "JetBrains Mono", monospace;
                line-height: 1.6;
                animation: fadeIn 0.3s ease;
                display: none;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(4px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .feedback.show {
                display: block;
            }

            .feedback.correct-fb {
                background: rgba(16, 185, 129, 0.08);
                border: 1px solid rgba(16, 185, 129, 0.3);
                color: #6ee7b7;
            }

            .feedback.wrong-fb {
                background: rgba(239, 68, 68, 0.08);
                border: 1px solid rgba(239, 68, 68, 0.3);
                color: #fca5a5;
            }

            /* Next Button */
            .next-btn {
                display: none;
                margin-top: 20px;
                width: 100%;
                padding: 16px;
                background: linear-gradient(135deg, var(--accent), #6d28d9);
                border: none;
                border-radius: 10px;
                color: white;
                font-family: "Syne", sans-serif;
                font-size: 15px;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.2s ease;
                letter-spacing: 0.5px;
            }

            .next-btn.show {
                display: block;
                animation: fadeIn 0.3s ease;
            }

            .next-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
            }

            /* Results */
            .results {
                display: none;
                text-align: center;
            }

            .results.show {
                display: block;
                animation: cardIn 0.5s ease;
            }

            .score-ring {
                width: 160px;
                height: 160px;
                margin: 0 auto 32px;
                position: relative;
            }

            .score-ring svg {
                transform: rotate(-90deg);
            }

            .score-ring-text {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .score-num {
                font-size: 36px;
                font-weight: 800;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .score-total {
                font-size: 13px;
                color: var(--muted);
                font-family: "JetBrains Mono", monospace;
            }

            .result-title {
                font-size: 28px;
                font-weight: 800;
                margin-bottom: 12px;
            }

            .result-msg {
                color: var(--muted);
                font-size: 14px;
                font-family: "JetBrains Mono", monospace;
                margin-bottom: 40px;
                line-height: 1.7;
            }

            .stats-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
                margin-bottom: 36px;
            }

            .stat-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 20px;
            }

            .stat-value {
                font-size: 28px;
                font-weight: 800;
                font-family: "JetBrains Mono", monospace;
                margin-bottom: 4px;
            }

            .stat-label {
                font-size: 11px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .restart-btn {
                padding: 16px 40px;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                border: none;
                border-radius: 10px;
                color: white;
                font-family: "Syne", sans-serif;
                font-size: 15px;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .restart-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 32px rgba(124, 58, 237, 0.5);
            }

            /* Category tags */
            .category-tag {
                display: inline-block;
                font-size: 10px;
                font-family: "JetBrains Mono", monospace;
                padding: 3px 10px;
                border-radius: 20px;
                margin-bottom: 10px;
                letter-spacing: 1px;
                text-transform: uppercase;
                background: rgba(6, 182, 212, 0.1);
                border: 1px solid rgba(6, 182, 212, 0.3);
                color: var(--accent2);
            }

            #quiz-area {
                animation: fadeIn 0.4s ease;
            }
        </style>
    </head>
    <body>
        <div class="glow-orb orb1"></div>
        <div class="glow-orb orb2"></div>

        <div class="container">
            <div class="header">
                <div class="badge" id="quiz-badge">Questions</div>
                <h1>JS String &amp; Array Patterns</h1>
                <p class="subtitle">// strings · arrays · patterns mastery</p>
            </div>

            <div class="progress-area">
                <div class="progress-info">
                    <span class="progress-label" id="progress-label"
                        >Question 0 / 30</span
                    >
                    <span class="progress-score" id="score-label"
                        >Score: 0</span
                    >
                </div>
                <div class="progress-bar">
                    <div
                        class="progress-fill"
                        id="progress-fill"
                        style="width: 0%"
                    ></div>
                </div>
            </div>

            <div id="quiz-area">
                <div class="question-card" id="question-card">
                    <div class="question-number" id="q-number">QUESTION 01</div>
                    <div class="category-tag" id="q-category">Methods</div>
                    <div class="question-text" id="q-text"></div>
                    <div
                        class="code-block"
                        id="q-code"
                        style="display: none"
                    ></div>
                    <div class="options" id="options-container"></div>
                    <div class="feedback" id="feedback"></div>
                    <button class="next-btn" id="next-btn">
                        Next Question →
                    </button>
                </div>
            </div>

            <div class="results" id="results">
                <div class="score-ring">
                    <svg width="160" height="160" viewBox="0 0 160 160">
                        <circle
                            cx="80"
                            cy="80"
                            r="66"
                            fill="none"
                            stroke="#1a1a26"
                            stroke-width="12"
                        />
                        <circle
                            cx="80"
                            cy="80"
                            r="66"
                            fill="none"
                            stroke="url(#grad)"
                            stroke-width="12"
                            stroke-linecap="round"
                            stroke-dasharray="414.69"
                            id="score-circle"
                            stroke-dashoffset="414.69"
                        />
                        <defs>
                            <linearGradient
                                id="grad"
                                x1="0%"
                                y1="0%"
                                x2="100%"
                                y2="0%"
                            >
                                <stop offset="0%" style="stop-color: #7c3aed" />
                                <stop
                                    offset="100%"
                                    style="stop-color: #06b6d4"
                                />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="score-ring-text">
                        <div class="score-num" id="final-score">0</div>
                        <div class="score-total" id="score-total">/ 51</div>
                    </div>
                </div>
                <div class="result-title" id="result-title">Quiz Complete!</div>
                <div class="result-msg" id="result-msg"></div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div
                            class="stat-value"
                            id="stat-correct"
                            style="color: var(--correct)"
                        >
                            0
                        </div>
                        <div class="stat-label">Correct</div>
                    </div>
                    <div class="stat-card">
                        <div
                            class="stat-value"
                            id="stat-wrong"
                            style="color: var(--wrong)"
                        >
                            0
                        </div>
                        <div class="stat-label">Incorrect</div>
                    </div>
                    <div class="stat-card">
                        <div
                            class="stat-value"
                            id="stat-pct"
                            style="color: var(--accent2)"
                        >
                            0%
                        </div>
                        <div class="stat-label">Accuracy</div>
                    </div>
                </div>
                <button class="restart-btn" onclick="restartQuiz()">
                    ↺ Retake Quiz
                </button>
            </div>
        </div>

        <script>
            const questions = [
                // === BASICS ===
                {
                    category: "Basics",
                    text: "What does the following expression return?",
                    code: `"Hello, World!".length`,
                    options: ["12", "13", "14", "11"],
                    answer: 1,
                    explanation:
                        "The string 'Hello, World!' has 13 characters (including comma and space). .length returns 13.",
                },
                {
                    category: "Basics",
                    text: "What is the output of this code?",
                    code: `const s = "javascript";\nconsole.log(s[0]);`,
                    options: ['"j"', '"J"', "undefined", "1"],
                    answer: 0,
                    explanation:
                        "Bracket notation accesses characters by index. Index 0 is the first character 'j'.",
                },
                {
                    category: "charAt / charCodeAt",
                    text: "What does the following return?",
                    code: `"hello".charAt(1)`,
                    options: ['"h"', '"e"', '"l"', "undefined"],
                    answer: 1,
                    explanation:
                        ".charAt(1) returns the character at index 1, which is 'e'.",
                },
                {
                    category: "charAt / charCodeAt",
                    text: "What is the result?",
                    code: `"A".charCodeAt(0)`,
                    options: ["65", "97", "64", "1"],
                    answer: 0,
                    explanation:
                        ".charCodeAt(0) returns the UTF-16 code for 'A', which is 65. Lowercase 'a' is 97.",
                },
                // === CASE ===
                {
                    category: "Case Methods",
                    text: "What does this log?",
                    code: `console.log("Hello World".toUpperCase());`,
                    options: [
                        '"HELLO WORLD"',
                        '"hello world"',
                        '"Hello World"',
                        "Error",
                    ],
                    answer: 0,
                    explanation:
                        ".toUpperCase() converts all characters to uppercase.",
                },
                {
                    category: "Case Methods",
                    text: "What is the output?",
                    code: `"JavaScript".toLowerCase()`,
                    options: [
                        '"javascript"',
                        '"JAVASCRIPT"',
                        '"JavaScript"',
                        '"Javascript"',
                    ],
                    answer: 0,
                    explanation:
                        ".toLowerCase() converts every character to its lowercase equivalent.",
                },
                // === SLICE / SUBSTRING ===
                {
                    category: "Slice & Substring",
                    text: "What does this return?",
                    code: `"Hello World".slice(6)`,
                    options: ['"Hello"', '"World"', '"orld"', '"Hello W"'],
                    answer: 1,
                    explanation:
                        ".slice(6) returns everything from index 6 to the end: 'World'.",
                },
                {
                    category: "Slice & Substring",
                    text: "What is the output?",
                    code: `"abcdef".slice(1, 4)`,
                    options: ['"abc"', '"bcd"', '"bcde"', '"abcd"'],
                    answer: 1,
                    explanation:
                        ".slice(1, 4) extracts from index 1 up to (not including) index 4: 'bcd'.",
                },
                {
                    category: "Slice & Substring",
                    text: "What does this return?",
                    code: `"Hello World".slice(-5)`,
                    options: ['"Hello"', '"World"', '"orld"', '" Worl"'],
                    answer: 1,
                    explanation:
                        "Negative index counts from the end. -5 starts 5 characters from the end: 'World'.",
                },
                {
                    category: "Slice & Substring",
                    text: "What does substring return here?",
                    code: `"JavaScript".substring(4, 10)`,
                    options: ['"Script"', '"aScrip"', '"cript"', '"vaScri"'],
                    answer: 0,
                    explanation:
                        ".substring(4, 10) extracts from index 4 to 10 (exclusive): 'Script'.",
                },
                // === SEARCH & FIND ===
                {
                    category: "Search",
                    text: "What is the result?",
                    code: `"hello world".indexOf("world")`,
                    options: ["5", "6", "-1", "4"],
                    answer: 1,
                    explanation:
                        "'world' starts at index 6 in 'hello world' (space is index 5).",
                },
                {
                    category: "Search",
                    text: "What does this return?",
                    code: `"banana".lastIndexOf("a")`,
                    options: ["1", "3", "5", "6"],
                    answer: 2,
                    explanation:
                        ".lastIndexOf() finds the last occurrence. The last 'a' in 'banana' is at index 5.",
                },
                {
                    category: "Search",
                    text: "What does includes() return here?",
                    code: `"Hello World".includes("world")`,
                    options: ["true", "false", "0", "undefined"],
                    answer: 1,
                    explanation:
                        ".includes() is case-sensitive. 'world' (lowercase) is not in 'Hello World', so it returns false.",
                },
                {
                    category: "Search",
                    text: "What is the output?",
                    code: `"https://example.com".startsWith("https")`,
                    options: ["true", "false", '"https"', "undefined"],
                    answer: 0,
                    explanation:
                        ".startsWith('https') checks if the string begins with 'https' — it does, so true.",
                },
                {
                    category: "Search",
                    text: "What does endsWith return?",
                    code: `"image.png".endsWith(".jpg")`,
                    options: ["true", "false", "null", '"png"'],
                    answer: 1,
                    explanation:
                        "The string ends with '.png', not '.jpg', so .endsWith('.jpg') returns false.",
                },
                // === REPLACE ===
                {
                    category: "Replace",
                    text: "What is logged?",
                    code: `console.log("foo foo foo".replace("foo", "bar"));`,
                    options: [
                        '"bar bar bar"',
                        '"bar foo foo"',
                        '"foo foo bar"',
                        "Error",
                    ],
                    answer: 1,
                    explanation:
                        ".replace() only replaces the FIRST match. Use .replaceAll() or regex with /g flag to replace all.",
                },
                {
                    category: "Replace",
                    text: "What does replaceAll return?",
                    code: `"cat cat cat".replaceAll("cat", "dog")`,
                    options: [
                        '"dog cat cat"',
                        '"cat dog cat"',
                        '"dog dog dog"',
                        '"cat cat dog"',
                    ],
                    answer: 2,
                    explanation:
                        ".replaceAll() replaces every occurrence of 'cat' with 'dog'.",
                },
                {
                    category: "Replace",
                    text: "What is the result?",
                    code: `"Hello World".replace(/o/g, "0")`,
                    options: [
                        '"Hell0 World"',
                        '"Hello W0rld"',
                        '"Hell0 W0rld"',
                        '"H0ll0 W0rld"',
                    ],
                    answer: 2,
                    explanation:
                        "The regex /o/g with the global flag replaces all occurrences of 'o' with '0'.",
                },
                // === SPLIT & JOIN ===
                {
                    category: "Split & Join",
                    text: "What is the output?",
                    code: `"a,b,c,d".split(",")`,
                    options: [

            let current = 0;
            let score = 0;
            let answered = false;

            function renderQuestion() {
                const q = questions[current];
                answered = false;

                document.getElementById("q-number").textContent =
                    `QUESTION ${String(current + 1).padStart(2, "0")}`;
                document.getElementById("q-category").textContent = q.category;
                document.getElementById("q-text").textContent = q.text;

                const codeEl = document.getElementById("q-code");
                if (q.code) {
                    codeEl.style.display = "block";
                    codeEl.textContent = q.code;
                } else {
                    codeEl.style.display = "none";
                }

                const container = document.getElementById("options-container");
                container.innerHTML = "";
                const labels = ["A", "B", "C", "D"];
                q.options.forEach((opt, i) => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span class="option-text">${opt}</span>`;
                    btn.onclick = () => selectAnswer(i);
                    container.appendChild(btn);
                });

                document.getElementById("feedback").className = "feedback";
                document.getElementById("feedback").textContent = "";
                document.getElementById("next-btn").className = "next-btn";

                updateProgress();

                // Animate card
                const card = document.getElementById("question-card");
                card.style.animation = "none";
                requestAnimationFrame(() => {
                    card.style.animation =
                        "cardIn 0.4s cubic-bezier(0.4, 0, 0.2, 1)";
                });
            }

            function selectAnswer(idx) {
                if (answered) return;
                answered = true;

                const q = questions[current];
                const btns = document.querySelectorAll(".option-btn");
                btns.forEach((b) => (b.disabled = true));

                const feedbackEl = document.getElementById("feedback");

                if (idx === q.answer) {
                    score++;
                    btns[idx].classList.add("correct");
                    feedbackEl.className = "feedback correct-fb show";
                    feedbackEl.textContent = "✓ Correct! " + q.explanation;
                } else {
                    btns[idx].classList.add("wrong");
                    btns[q.answer].classList.add("correct");
                    feedbackEl.className = "feedback wrong-fb show";
                    feedbackEl.textContent = "✗ Incorrect. " + q.explanation;
                }

                updateProgress();
                const nextBtn = document.getElementById("next-btn");
                nextBtn.textContent =
                    current === questions.length - 1
                        ? "See Results →"
                        : "Next Question →";
                nextBtn.className = "next-btn show";
            }

            function nextQuestion() {
                current++;
                if (current >= questions.length) {
                    showResults();
                } else {
                    renderQuestion();
                }
            }

            function updateProgress() {
                const pct = (current / questions.length) * 100;
                document.getElementById("progress-fill").style.width =
                    pct + "%";
                document.getElementById("progress-label").textContent =
                    `Question ${current + 1} / ${questions.length}`;
                document.getElementById("score-label").textContent =
                    `Score: ${score}`;
            }

            function showResults() {
                document.getElementById("quiz-area").style.display = "none";
                document.getElementById("progress-area").style.display = "none";

                const results = document.getElementById("results");
                results.style.display = "block";
                results.className = "results show";

                document.getElementById("score-total").textContent =
                    "/ " + questions.length;
                results.scrollIntoView({ behavior: "smooth", block: "start" });

                const pct = Math.round((score / questions.length) * 100);

                document.getElementById("final-score").textContent = score;
                document.getElementById("stat-correct").textContent = score;
                document.getElementById("stat-wrong").textContent =
                    questions.length - score;
                document.getElementById("stat-pct").textContent = pct + "%";

                let title, msg;
                if (pct >= 90) {
                    title = "🏆 Outstanding!";
                    msg =
                        "You have mastered JavaScript string methods.\nAre you sure you're not V8 itself?";
                } else if (pct >= 75) {
                    title = "🎉 Great Work!";
                    msg =
                        "Solid command of string methods.\nA few edge cases to review.";
                } else if (pct >= 60) {
                    title = "👍 Not Bad!";
                    msg =
                        "Good foundation! Some methods need a bit more practice.\nKeep coding!";
                } else if (pct >= 40) {
                    title = "📚 Keep Learning";
                    msg =
                        "You know the basics but string methods have more to offer.\nReview and retry!";
                } else {
                    title = "💪 Keep Going!";
                    msg =
                        "String methods can be tricky at first.\nPractice and you'll get there!";
                }

                document.getElementById("result-title").textContent = title;
                document.getElementById("result-msg").textContent = msg;

                // Animate circle
                const circumference = 414.69;
                const offset = circumference - (pct / 100) * circumference;
                setTimeout(() => {
                    document.getElementById("score-circle").style.transition =
                        "stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1)";
                    document.getElementById(
                        "score-circle",
                    ).style.strokeDashoffset = offset;
                }, 100);
            }

            function restartQuiz() {
                current = 0;
                score = 0;
                answered = false;

                const resultsEl = document.getElementById("results");
                resultsEl.style.display = "";
                resultsEl.className = "results";
                document.getElementById("quiz-area").style.display = "block";
                document.getElementById("progress-area").style.display =
                    "block";
                document.getElementById("score-circle").style.strokeDashoffset =
                    414.69;

                renderQuestion();
            }

            // Init
            document.getElementById("quiz-badge").textContent =
                questions.length + " Questions";
            document
                .getElementById("next-btn")
                .addEventListener("click", nextQuestion);
            renderQuestion();
        </script>
