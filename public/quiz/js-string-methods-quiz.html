<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS String Methods Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #13161c;
    --surface2: #1a1e27;
    --border: #252a36;
    --border-bright: #3a4155;
    --text: #e2e8f8;
    --muted: #6b7694;
    --accent: #64ffda;
    --accent2: #ff6b9d;
    --accent3: #ffd166;
    --blue: #7eb3ff;
    --green: #4ade80;
    --red: #f87171;
    --purple: #c084fc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(100,255,218,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100,255,218,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  .header {
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .header-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-tag::before {
    content: '//';
    color: var(--muted);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 0%, var(--blue) 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
    max-width: 560px;
  }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    margin: 32px 0;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
    box-shadow: 0 0 12px rgba(100,255,218,0.4);
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--blue), var(--purple));
    opacity: 0.6;
  }

  .question-num {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .question-num span {
    color: var(--muted);
  }

  .question-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 8px;
  }

  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 16px 20px;
    margin: 16px 0;
    font-size: 13px;
    line-height: 1.7;
    color: var(--blue);
    overflow-x: auto;
    position: relative;
  }

  .code-block .kw { color: var(--purple); }
  .code-block .str { color: var(--accent3); }
  .code-block .fn { color: var(--accent); }
  .code-block .cmt { color: var(--muted); font-style: italic; }
  .code-block .num { color: var(--accent2); }
  .code-block .blank {
    display: inline-block;
    min-width: 120px;
    background: rgba(100,255,218,0.08);
    border: 1px dashed var(--accent);
    border-radius: 4px;
    padding: 0 8px;
    color: var(--accent);
    text-align: center;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* ── OPTIONS ── */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }

  @media (max-width: 560px) {
    .options { grid-template-columns: 1fr; }
  }

  .option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    text-align: left;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    line-height: 1.4;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(100,255,218,0.06);
    color: var(--accent);
    transform: translateY(-1px);
  }

  .option:disabled { cursor: default; }

  .option.correct {
    border-color: var(--green);
    background: rgba(74,222,128,0.08);
    color: var(--green);
  }

  .option.wrong {
    border-color: var(--red);
    background: rgba(248,113,113,0.08);
    color: var(--red);
  }

  .option.reveal {
    border-color: var(--green);
    background: rgba(74,222,128,0.05);
    color: var(--green);
    opacity: 0.7;
  }

  .opt-label {
    font-size: 10px;
    color: var(--muted);
    background: var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    flex-shrink: 0;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .option.correct .opt-label { background: rgba(74,222,128,0.2); color: var(--green); }
  .option.wrong .opt-label { background: rgba(248,113,113,0.2); color: var(--red); }
  .option.reveal .opt-label { background: rgba(74,222,128,0.15); color: var(--green); }

  /* ── EXPLANATION ── */
  .explanation {
    margin-top: 16px;
    padding: 16px 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    display: none;
    animation: fadeUp 0.3s ease both;
  }

  .explanation.show { display: block; }

  .explanation strong {
    color: var(--accent3);
  }

  /* ── NEXT BUTTON ── */
  .btn-next {
    display: none;
    margin-top: 20px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-next:hover {
    background: rgba(100,255,218,0.1);
    box-shadow: 0 0 20px rgba(100,255,218,0.2);
  }

  .btn-next.show { display: inline-block; }

  /* ── SCORE SCREEN ── */
  #score-screen {
    display: none;
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }

  .score-ring {
    width: 180px;
    height: 180px;
    margin: 0 auto 32px;
    position: relative;
  }

  .score-ring svg {
    transform: rotate(-90deg);
    width: 180px;
    height: 180px;
  }

  .score-ring circle {
    fill: none;
    stroke-width: 8;
    cx: 90;
    cy: 90;
    r: 82;
  }

  .ring-bg { stroke: var(--border); }
  .ring-fill {
    stroke: url(#ringGrad);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
  }

  .score-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-number {
    font-family: 'Syne', sans-serif;
    font-size: 42px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .score-denom {
    font-size: 13px;
    color: var(--muted);
  }

  .score-grade {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .score-msg {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
    max-width: 440px;
    margin: 0 auto 32px;
  }

  .breakdown {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .breakdown-item {
    text-align: center;
  }

  .breakdown-val {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .breakdown-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .btn-restart {
    background: var(--accent);
    color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 36px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-restart:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(100,255,218,0.3);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 13px;
    z-index: 100;
    transform: translateX(120%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toast.show { transform: translateX(0); }
  .toast.good { border-color: var(--green); color: var(--green); }
  .toast.bad { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">

  <div class="header">
    <div class="header-tag">JavaScript · String Methods</div>
    <h1>String Methods<br>& Patterns Quiz</h1>
    <p class="subtitle">30 scenario-based questions. For each situation, identify the correct string method or pattern to use.</p>
  </div>

  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-meta">
      <span id="q-counter">Question 1 / 30</span>
      <span id="score-counter">Score: 0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div id="quiz-area"></div>

  <div id="score-screen">
    <svg width="0" height="0">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#64ffda"/>
          <stop offset="100%" stop-color="#7eb3ff"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="score-ring">
      <svg viewBox="0 0 180 180">
        <defs>
          <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#64ffda"/>
            <stop offset="100%" stop-color="#7eb3ff"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="90" cy="90" r="82"/>
        <circle class="ring-fill" id="ring-fill" cx="90" cy="90" r="82"
          stroke-dasharray="515" stroke-dashoffset="515"/>
      </svg>
      <div class="score-center">
        <div class="score-number" id="final-score">0</div>
        <div class="score-denom">/ 30</div>
      </div>
    </div>
    <div class="score-grade" id="score-grade"></div>
    <p class="score-msg" id="score-msg"></p>
    <div class="breakdown">
      <div class="breakdown-item">
        <div class="breakdown-val" style="color:var(--green)" id="bd-correct">0</div>
        <div class="breakdown-label">Correct</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-val" style="color:var(--red)" id="bd-wrong">0</div>
        <div class="breakdown-label">Wrong</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-val" style="color:var(--accent3)" id="bd-pct">0%</div>
        <div class="breakdown-label">Accuracy</div>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">↻ &nbsp;Restart Quiz</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "You want to check if a string contains the word <code>'error'</code> anywhere inside it. Which method should you use?",
    code: `<span class="kw">const</span> log = <span class="str">"Connection error: timeout"</span>;\n<span class="kw">const</span> hasError = log.<span class="blank">???</span>(<span class="str">"error"</span>);`,
    options: ["includes()", "indexOf()", "search()", "match()"],
    answer: 0,
    explanation: "<strong>includes()</strong> returns a boolean directly — perfect when you just need to know if a substring exists. <code>indexOf()</code> works too but returns a number you'd need to compare against -1."
  },
  {
    q: "You need to extract the filename from a full file path string like <code>'/home/user/docs/report.pdf'</code>. Which method splits it into parts?",
    code: `<span class="kw">const</span> path = <span class="str">'/home/user/docs/report.pdf'</span>;\n<span class="kw">const</span> parts = path.<span class="blank">???</span>(<span class="str">'/'</span>);\n<span class="kw">const</span> file = parts[parts.length - <span class="num">1</span>];`,
    options: ["split()", "slice()", "substring()", "match()"],
    answer: 0,
    explanation: "<strong>split(separator)</strong> divides a string into an array of substrings using a delimiter. It's the go-to for parsing delimited data like file paths, CSV rows, or URL segments."
  },
  {
    q: "A user entered their email with mixed casing: <code>'User@Example.COM'</code>. You want to normalize it to all lowercase before storing.",
    code: `<span class="kw">const</span> email = <span class="str">'User@Example.COM'</span>;\n<span class="kw">const</span> normalized = email.<span class="blank">???</span>();`,
    options: ["toLowerCase()", "trim()", "normalize()", "replace()"],
    answer: 0,
    explanation: "<strong>toLowerCase()</strong> converts every character to lowercase. Use <code>toUpperCase()</code> for the reverse. These are the standard methods for case normalization."
  },
  {
    q: "You want to remove accidental whitespace a user left at both ends of an input field value.",
    code: `<span class="kw">const</span> input = <span class="str">"  hello world  "</span>;\n<span class="kw">const</span> clean = input.<span class="blank">???</span>();`,
    options: ["trim()", "replace()", "split()", "slice()"],
    answer: 0,
    explanation: "<strong>trim()</strong> removes leading and trailing whitespace (spaces, tabs, newlines). <code>trimStart()</code> and <code>trimEnd()</code> are available if you only need one side."
  },
  {
    q: "You want to replace ALL occurrences of <code>'foo'</code> with <code>'bar'</code> in a string.",
    code: `<span class="kw">const</span> str = <span class="str">"foo is foo and foo"</span>;\n<span class="kw">const</span> result = str.<span class="blank">???</span>(<span class="str">'foo'</span>, <span class="str">'bar'</span>);`,
    options: ["replaceAll()", "replace()", "split().join()", "map()"],
    answer: 0,
    explanation: "<strong>replaceAll()</strong> (ES2021) replaces every occurrence. <code>replace()</code> with a string only replaces the <em>first</em> match. You can also use <code>replace(/foo/g, 'bar')</code> with a global regex flag."
  },
  {
    q: "You need to check if a URL string starts with <code>'https'</code> to verify it's secure.",
    code: `<span class="kw">const</span> url = <span class="str">"https://example.com"</span>;\n<span class="kw">const</span> isSecure = url.<span class="blank">???</span>(<span class="str">"https"</span>);`,
    options: ["startsWith()", "includes()", "indexOf()", "charAt()"],
    answer: 0,
    explanation: "<strong>startsWith()</strong> checks if the string begins with the given prefix. It also accepts an optional second argument as the starting position to check from."
  },
  {
    q: "You need to check if a filename ends with <code>'.jpg'</code> to validate image uploads.",
    code: `<span class="kw">const</span> file = <span class="str">"photo.jpg"</span>;\n<span class="kw">const</span> isJpg = file.<span class="blank">???</span>(<span class="str">".jpg"</span>);`,
    options: ["endsWith()", "includes()", "lastIndexOf()", "slice()"],
    answer: 0,
    explanation: "<strong>endsWith()</strong> checks if the string ends with the given suffix. You can also pass a length as a second argument to treat the string as if it only had that many characters."
  },
  {
    q: "You want to extract a portion of a string — characters from index 7 up to (but not including) index 12.",
    code: `<span class="kw">const</span> str = <span class="str">"Hello, World!"</span>;\n<span class="kw">const</span> word = str.<span class="blank">???</span>(<span class="num">7</span>, <span class="num">12</span>);`,
    options: ["slice()", "charAt()", "indexOf()", "split()"],
    answer: 0,
    explanation: "<strong>slice(start, end)</strong> extracts characters from <em>start</em> up to but not including <em>end</em>. It also supports negative indices (counting from the end). Prefer <code>slice()</code> over <code>substring()</code> for its cleaner negative-index support."
  },
  {
    q: "A product ID must always be 8 characters. If it's shorter, you need to pad it with zeros on the left.",
    code: `<span class="kw">const</span> id = <span class="str">"42"</span>;\n<span class="kw">const</span> padded = id.<span class="blank">???</span>(<span class="num">8</span>, <span class="str">"0"</span>); <span class="cmt">// "00000042"</span>`,
    options: ["padStart()", "padEnd()", "repeat()", "slice()"],
    answer: 0,
    explanation: "<strong>padStart(targetLength, padString)</strong> pads the start of a string until it reaches the target length — great for zero-padding numbers or aligning columns. Use <code>padEnd()</code> to pad the end instead."
  },
  {
    q: "You're building a text expander. The user typed <code>'=-'</code> and you want to output a divider of 40 dashes.",
    code: `<span class="kw">const</span> divider = <span class="str">"-"</span>.<span class="blank">???</span>(<span class="num">40</span>);`,
    options: ["repeat()", "padEnd()", "fill()", "concat()"],
    answer: 0,
    explanation: "<strong>repeat(count)</strong> returns a new string with the original repeated <em>count</em> times. Perfect for generating separators, placeholder content, or repeated patterns."
  },
  {
    q: "You want to find the position (index) of the first occurrence of the substring <code>'port'</code> in a string.",
    code: `<span class="kw">const</span> str = <span class="str">"transport report"</span>;\n<span class="kw">const</span> pos = str.<span class="blank">???</span>(<span class="str">"port"</span>); <span class="cmt">// 5</span>`,
    options: ["indexOf()", "search()", "includes()", "findIndex()"],
    answer: 0,
    explanation: "<strong>indexOf()</strong> returns the index of the first match, or -1 if not found. It accepts a second argument to start searching from a specific position. Use <code>lastIndexOf()</code> to search from the end."
  },
  {
    q: "You want to convert a number to a string so you can manipulate it with string methods.",
    code: `<span class="kw">const</span> num = <span class="num">42</span>;\n<span class="kw">const</span> str = num.<span class="blank">???</span>();`,
    options: ["toString()", "String()", "toFixed()", "valueOf()"],
    answer: 0,
    explanation: "<strong>toString()</strong> converts a number (or other value) to a string. It also accepts a radix argument: <code>(255).toString(16)</code> gives <code>'ff'</code>. Alternatively, <code>String(value)</code> is a safer wrapper that handles <code>null</code>/<code>undefined</code> without throwing."
  },
  {
    q: "You need to get the character at a specific index in a string.",
    code: `<span class="kw">const</span> str = <span class="str">"JavaScript"</span>;\n<span class="kw">const</span> ch = str.<span class="blank">???</span>(<span class="num">4</span>); <span class="cmt">// "S"</span>`,
    options: ["charAt()", "charCodeAt()", "at()", "slice()"],
    answer: 0,
    explanation: "<strong>charAt(index)</strong> returns the character at the given position. Modern code often uses bracket notation <code>str[4]</code> instead. The newer <strong>at()</strong> method also works and supports negative indices."
  },
  {
    q: "You want to get the last character of a string without knowing its length in advance.",
    code: `<span class="kw">const</span> str = <span class="str">"JavaScript"</span>;\n<span class="kw">const</span> last = str.<span class="blank">???</span>(-<span class="num">1</span>); <span class="cmt">// "t"</span>`,
    options: ["at()", "slice()", "charAt()", "indexOf()"],
    answer: 0,
    explanation: "<strong>at()</strong> (ES2022) supports negative indices, making <code>str.at(-1)</code> an elegant way to get the last character — much cleaner than <code>str[str.length - 1]</code>."
  },
  {
    q: "You need to test whether a string matches a regular expression pattern (e.g., check if it's a valid hex color code).",

let current = 0;
let score = 0;
let answered = false;

function render() {
  const qa = document.getElementById('quiz-area');
  qa.innerHTML = '';

  const q = questions[current];
  const card = document.createElement('div');
  card.className = 'question-card';

  const labels = ['A', 'B', 'C', 'D'];

  card.innerHTML = `
    <div class="question-num">Q${current + 1} <span>of ${questions.length}</span></div>
    <div class="question-text">${q.q}</div>
    ${q.code ? `<div class="code-block">${q.code}</div>` : ''}
    <div class="options">
      ${q.options.map((opt, i) => `
        <button class="option" onclick="select(${i})" data-idx="${i}">
          <span class="opt-label">${labels[i]}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div class="explanation" id="explanation">${q.explanation}</div>
  `;

  qa.appendChild(card);

  const btn = document.createElement('button');
  btn.className = 'btn-next';
  btn.id = 'btn-next';
  btn.textContent = current < questions.length - 1 ? 'Next Question →' : 'See Results →';
  btn.onclick = next;
  qa.appendChild(btn);

  updateProgress();
  answered = false;
}

function select(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  const labels = ['A', 'B', 'C', 'D'];

  opts.forEach(o => o.disabled = true);

  if (idx === q.answer) {
    opts[idx].classList.add('correct');
    score++;
    showToast('✓ Correct!', 'good');
  } else {
    opts[idx].classList.add('wrong');
    opts[q.answer].classList.add('reveal');
    showToast('✗ Incorrect', 'bad');
  }

  document.getElementById('explanation').classList.add('show');
  document.getElementById('btn-next').classList.add('show');
  updateProgress();
}

function next() {
  current++;
  if (current >= questions.length) {
    showScore();
  } else {
    render();
  }
}

function updateProgress() {
  const pct = ((current + (answered ? 1 : 0)) / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `Question ${current + 1} / ${questions.length}`;
  document.getElementById('score-counter').textContent = `Score: ${score}`;
}

function showScore() {
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'none';

  const ss = document.getElementById('score-screen');
  ss.style.display = 'block';

  document.getElementById('final-score').textContent = score;
  document.getElementById('bd-correct').textContent = score;
  document.getElementById('bd-wrong').textContent = questions.length - score;
  document.getElementById('bd-pct').textContent = Math.round((score / questions.length) * 100) + '%';

  const pct = score / questions.length;
  let grade, msg, color;

  if (pct >= 0.9) {
    grade = '🏆 Expert'; msg = "Outstanding! You have a strong command of JavaScript string methods. You clearly know which tool to reach for in any scenario."; color = 'var(--accent)';
  } else if (pct >= 0.75) {
    grade = '⚡ Proficient'; msg = "Great work! You understand most string methods well. Review the ones you missed and you'll be at expert level in no time."; color = 'var(--blue)';
  } else if (pct >= 0.5) {
    grade = '📚 Learning'; msg = "Solid foundation! You know the basics but some scenarios still trip you up. Focus on when to use regex-based methods vs simple string methods."; color = 'var(--accent3)';
  } else {
    grade = '🌱 Beginner'; msg = "Keep practicing! String methods are essential in JS. Try reviewing MDN docs for each method and then take the quiz again."; color = 'var(--red)';
  }

  document.getElementById('score-grade').textContent = grade;
  document.getElementById('score-grade').style.color = color;
  document.getElementById('score-msg').textContent = msg;

  // Animate ring
  const circumference = 515;
  const offset = circumference - (circumference * pct);
  setTimeout(() => {
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
  }, 100);
}

function restart() {
  current = 0;
  score = 0;
  answered = false;

  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('ring-fill').style.strokeDashoffset = 515;

  render();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2000);
}

render();
</script>
